appId: com.buildbrendon.mister-companion
productName: MiSTer Companion
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
# Tray icons must exist at runtime (build/ is a build-resource, not bundled by default).
extraResources:
  - from: build/tray.png
    to: tray.png
  - from: build/tray@2x.png
    to: tray@2x.png
  - from: build/trayTemplate.png
    to: trayTemplate.png
  - from: build/trayTemplate@2x.png
    to: trayTemplate@2x.png
afterPack: build/afterPack.js
mac:
  target: [dmg]
  category: public.app-category.utilities
  # No paid Developer ID; afterPack.js applies an ad-hoc signature instead.
  identity: null
  icon: build/icon.png
win:
  target: [nsis]
  icon: build/icon.png
linux:
  target: [AppImage]
  category: Utility
  icon: build/icon.png
publish:
  provider: github
  owner: hudsonbrendon
  repo: mister-companion
  # Publish directly (not a draft) so a v* tag produces a ready release.
  releaseType: release
