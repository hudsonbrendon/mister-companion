appId: com.buildbrendon.mister-companion
productName: MiSTer Companion
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
afterPack: build/afterPack.js
mac:
  target: [dmg]
  category: public.app-category.utilities
  # No paid Developer ID; afterPack.js applies an ad-hoc signature instead.
  identity: null
  icon: build/icon.png
win:
  target: [nsis]
  icon: build/icon.png
linux:
  target: [AppImage]
  category: Utility
  icon: build/icon.png
publish:
  provider: github
  owner: hudsonbrendon
  repo: mister-companion
  # Publish directly (not a draft) so a v* tag produces a ready release.
  releaseType: release
